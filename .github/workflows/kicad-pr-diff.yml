# SPDX-License-Identifier: MIT
name: KiCad PR Diff

on:
  pull_request:
    paths:
      - '**.kicad_sch'
      - '**.kicad_pcb'

concurrency:
  group: pr-diff-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  visual-diff:
    name: "Visual Diff — KiCad changes"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    permissions:
      pull-requests: write
      contents: read

    env:
      # ── USER CONFIG ─────────────────────────────────────────────────────────
      # Must match PROJECT_DIR in kicad-ci.yml if KiCad files are in a subdir.
      PROJECT_DIR: "hardware/rpi-cm4-LiM-board/KiCad Files"

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate current renders
        run: |
          mkdir -p diff/current
          PCB=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_pcb" ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$PCB" ]]; then
            kicad-cli pcb export svg --output "diff/current/pcb-front.svg" --layers "F.Cu,F.SilkS,F.Mask,Edge.Cuts" "$PCB" || true
            kicad-cli pcb export svg --output "diff/current/pcb-back.svg" --layers "B.Cu,B.SilkS,B.Mask,Edge.Cuts" "$PCB" || true
          fi
          SCH=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_sch" ! -name "*-rescue.kicad_sch" ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$SCH" ]]; then
            kicad-cli sch export svg --output "diff/current/" "$SCH" || true
          fi

      - name: Generate base renders
        run: |
          mkdir -p diff/base
          # Save current HEAD, checkout base, render, restore
          CURRENT_SHA="${{ github.sha }}"
          git checkout "${{ github.event.pull_request.base.sha }}" -- . 2>/dev/null || {
            echo "Could not checkout base — skipping diff"
            exit 0
          }
          PCB=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_pcb" ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$PCB" ]]; then
            kicad-cli pcb export svg --output "diff/base/pcb-front.svg" --layers "F.Cu,F.SilkS,F.Mask,Edge.Cuts" "$PCB" || true
            kicad-cli pcb export svg --output "diff/base/pcb-back.svg" --layers "B.Cu,B.SilkS,B.Mask,Edge.Cuts" "$PCB" || true
          fi
          SCH=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_sch" ! -name "*-rescue.kicad_sch" ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$SCH" ]]; then
            kicad-cli sch export svg --output "diff/base/" "$SCH" || true
          fi
          # Restore PR HEAD
          git checkout "$CURRENT_SHA" -- . 2>/dev/null || true

      - name: Upload diff artifacts
        uses: actions/upload-artifact@v4
        with:
          name: visual-diff
          path: diff/
          if-no-files-found: warn

      - name: Post PR comment with diffs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## 🔍 KiCad Visual Diff\n\n';
            body += 'Visual comparison of KiCad file changes in this PR.\n\n';

            const hasBase = fs.existsSync('diff/base');
            const hasCurrent = fs.existsSync('diff/current');

            if (!hasBase || !hasCurrent) {
              body += '⚠️ Could not generate visual diff (missing base or current renders).\n';
            } else {
              const currentFiles = fs.readdirSync('diff/current').filter(f => f.endsWith('.svg'));
              if (currentFiles.length > 0) {
                body += '| View | Status |\n';
                body += '|------|--------|\n';
                for (const file of currentFiles) {
                  const view = file.replace('.svg', '').replace(/-/g, ' ');
                  const hasBaseFile = fs.existsSync('diff/base/' + file);
                  body += '| ' + view + ' | ' + (hasBaseFile ? '✅ Base + Current' : '🆕 New file') + ' |\n';
                }
              }
            }

            const artifactUrl = context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId;
            body += '\n📦 [Download visual diff artifacts](' + artifactUrl + ') for full-resolution SVG comparison.\n';
            body += '\n---\n*Generated by [kicad-ci](https://github.com/DillanMcDonald/kicad-ci)*\n';

            // Find existing comment to update (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.includes('KiCad Visual Diff')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
