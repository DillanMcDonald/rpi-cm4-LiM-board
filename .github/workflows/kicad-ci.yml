# KiCad CI/CD — rpi-cm4-LiM-board fork
# Source project: l00nix/rpi-cm4-LiM-board (CC0-1.0 / public domain)
# Pipeline scripts: DillanMcDonald/kicad-ci (MIT)
#
# Jobs:
#   erc    → Electrical Rules Check
#   drc    → Design Rules Check + schematic parity
#   export → Full professional documentation suite
#   release→ GitHub Release on v* tags
#
# Container: ghcr.io/kicad/kicad:9.0 (GPL-3.0 binary, MIT pipeline scripts)

name: KiCad CI

on:
  push:
    branches: ["**"]
    tags:     ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  # LiM-board (original minimal version — USB-C power + CM4 + status LEDs)
  # Use the LiM+ variant by changing to:
  #   hardware/rpi-cm4-LiM+-board/KiCad Files
  PROJECT_DIR: "hardware/rpi-cm4-LiM-board/KiCad Files"
  # GitHub-hosted runners have no GPU — raytraced 3D render skipped.
  # Set to 0 on a self-hosted runner with GPU for rendered PNG output.
  SKIP_RENDER: "1"

# ── ERC ───────────────────────────────────────────────────────────────────────
jobs:
  erc:
    name: "ERC — Electrical Rules Check"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run ERC
        # continue-on-error: ERC is advisory for this upstream board.
        # The original project has intentional unconnected CM4 GPIO pins
        # which KiCad 9 classifies as errors in its default ERC rules.
        # DRC (layout) is the hard blocker. See erc-report artifact for detail.
        run: scripts/erc.sh
        continue-on-error: true

      - name: Upload ERC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erc-report
          path: output/erc/
          if-no-files-found: warn

# ── DRC ───────────────────────────────────────────────────────────────────────
  drc:
    name: "DRC — Design Rules Check"
    runs-on: ubuntu-latest
    # DRC checks PCB layout — independent of ERC (schematic). Run in parallel.
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run DRC
        run: scripts/drc.sh

      - name: Upload DRC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drc-report
          path: output/drc/
          if-no-files-found: warn

# ── Export ────────────────────────────────────────────────────────────────────
  export:
    name: "Export — Full Documentation Suite"
    runs-on: ubuntu-latest
    needs: [erc, drc]
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Export all documentation
        run: scripts/export.sh

      - name: Upload — Fabrication (Gerbers + drill + ZIP)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fab-${{ github.sha }}
          path: output/fab/
          if-no-files-found: warn

      - name: Upload — Documentation (PDFs + SVG schematic)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-${{ github.sha }}
          path: output/docs/
          if-no-files-found: warn

      - name: Upload — Board previews (SVG)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-${{ github.sha }}
          path: output/preview/
          if-no-files-found: warn

      - name: Upload — Assembly (BOM + pick-and-place + ZIP)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assembly-${{ github.sha }}
          path: output/assembly/
          if-no-files-found: warn

      - name: Upload — 3D (STEP model + renders)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 3d-${{ github.sha }}
          path: output/3d/
          if-no-files-found: warn

# ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: "Release — Publish full doc set on tag"
    runs-on: ubuntu-latest
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.sha }}"
          path: release-assets/
          merge-multiple: false

      - name: Package release assets
        run: |
          cd release-assets
          for dir in */; do
            name=$(echo "${dir%/}" | sed "s/-${{ github.sha }}//")
            zip -r "${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Release $GITHUB_REF_NAME" \
            --generate-notes \
            release-assets/*.zip
