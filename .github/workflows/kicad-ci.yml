#
# KiCad CI/CD — rpi-cm4-LiM-board fork
# Source project: l00nix/rpi-cm4-LiM-board (CC0-1.0 / public domain)
# Pipeline scripts: DillanMcDonald/kicad-ci (MIT)
#
# Jobs:
#   erc       → Electrical Rules Check (advisory — upstream has intentional unconnects)
#   drc       → Design Rules Check (advisory — KiCad 5→9 stricter rules)
#   export    → Full professional doc set + iBoM + testpoints + README
#   release   → GitHub Release with all docs attached (tags matching v*)
#   pages     → KDT-style HTML navigation site on GitHub Pages
#
# Container: ghcr.io/kicad/kicad:9.0 (GPL-3.0 binary, MIT pipeline scripts)

name: KiCad CI

on:
  push:
    branches: ["**"]
    tags:     ["v*"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'templates/**'
  pull_request:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'templates/**'
  workflow_dispatch:

concurrency:
  group: kicad-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # LiM-board (original minimal version — USB-C power + CM4 + status LEDs)
  # Use the LiM+ variant by changing to:
  #   hardware/rpi-cm4-LiM+-board/KiCad Files
  PROJECT_DIR: "hardware/rpi-cm4-LiM-board/KiCad Files"
  SKIP_RENDER: "0"
  BOARD_VARIANT: "RELEASED"

# ── ERC ───────────────────────────────────────────────────────────────────────
jobs:
  erc:
    name: "ERC — Electrical Rules Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run ERC
        # Advisory: upstream board has intentional unconnected CM4 GPIO pins
        run: scripts/erc.sh
        continue-on-error: true

      - name: Upload ERC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erc-report
          path: output/erc/
          if-no-files-found: warn

# ── DRC ───────────────────────────────────────────────────────────────────────
  drc:
    name: "DRC — Design Rules Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Parallel with ERC — DRC checks layout, independent of schematic
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Run DRC
        # Advisory: KiCad 5→9 stricter rules, 18 violations. 0 unconnected.
        run: scripts/drc.sh
        continue-on-error: true

      - name: Upload DRC report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: drc-report
          path: output/drc/
          if-no-files-found: warn

# ── Export ────────────────────────────────────────────────────────────────────
  export:
    name: "Export — Full Documentation Suite"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [drc]
    container:
      image: ghcr.io/kicad/kicad:9.0
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh scripts/*.py

      - name: Cache KiCad 3D models
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/kicad/9.0/3dmodels
            /root/.local/share/kicad/9.0/3dmodels
          key: kicad-3d-${{ hashFiles('**/*.kicad_pcb') }}
          restore-keys: kicad-3d-

      - name: Inject git metadata
        run: |
          PRO=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_pro" | sort | head -1)
          if [[ -n "$PRO" ]]; then
            python3 scripts/inject_git_meta.py \
              --project "$PRO" \
              --variant "$BOARD_VARIANT"
          fi

      - name: Sync revision from CHANGELOG
        run: |
          SCH=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_sch" \
                ! -name "*-rescue*" ! -path "*/ignore/*" ! -path "*/backups/*" \
                | sort | head -1)
          if [[ -n "$SCH" ]]; then
            python3 scripts/sync_revision.py --schematic "$SCH"
          fi

      - name: Export all documentation
        run: scripts/export.sh

      - name: Generate Interactive BOM
        run: scripts/ibom.sh
        continue-on-error: true

      - name: Generate distributor pricing XLSX
        env:
          DIGIKEY_CLIENT_ID: ${{ secrets.DIGIKEY_CLIENT_ID }}
          DIGIKEY_CLIENT_SECRET: ${{ secrets.DIGIKEY_CLIENT_SECRET }}
          DIGIKEY_DEBUG: "1"
          MOUSER_API_KEY: ${{ secrets.MOUSER_API_KEY }}
          NEXAR_CLIENT_ID: ${{ secrets.NEXAR_CLIENT_ID }}
          NEXAR_CLIENT_SECRET: ${{ secrets.NEXAR_CLIENT_SECRET }}
        run: scripts/pricing.sh
        continue-on-error: true

      - name: Extract test points
        run: |
          PCB=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_pcb" \
                ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$PCB" ]]; then
            python3 scripts/extract_testpoints.py --pcb "$PCB"
          fi
        continue-on-error: true

      - name: Generate README
        run: |
          PCB=$(find "$PROJECT_DIR" -maxdepth 2 -name "*.kicad_pcb" \
                ! -path "*/ignore/*" ! -path "*/backups/*" | sort | head -1)
          if [[ -n "$PCB" ]]; then
            pip install --quiet jinja2 2>/dev/null || true
            python3 scripts/gen_readme.py --pcb "$PCB" --output output/docs/BOARD-README.md
          fi
        continue-on-error: true

      # ── Artifact uploads ──────────────────────────────────────────────────
      - name: Upload — Fabrication
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fab-${{ github.sha }}
          path: output/fab/
          if-no-files-found: warn

      - name: Upload — Documentation
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-${{ github.sha }}
          path: output/docs/
          if-no-files-found: warn

      - name: Upload — Board previews
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preview-${{ github.sha }}
          path: output/preview/
          if-no-files-found: warn

      - name: Upload — Assembly
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: assembly-${{ github.sha }}
          path: output/assembly/
          if-no-files-found: warn

      - name: Upload — 3D
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: 3d-${{ github.sha }}
          path: output/3d/
          if-no-files-found: warn

      - name: Upload — Test points
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testpoints-${{ github.sha }}
          path: output/testpoints/
          if-no-files-found: warn

      - name: Upload — Source (for KiCanvas viewer)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: source-${{ github.sha }}
          path: output/source/
          if-no-files-found: warn

# ── Release ───────────────────────────────────────────────────────────────────
  release:
    name: "Release — Publish full doc set on tag"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-${{ github.sha }}"
          path: release-assets/
          merge-multiple: false

      - name: Package release assets
        run: |
          cd release-assets
          for dir in */; do
            category="${dir%/}"
            name=$(echo "$category" | sed "s/-${{ github.sha }}//")
            zip -r "${name}.zip" "$category/"
          done
          ls -lh *.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ── Pages ─────────────────────────────────────────────────────────────────────
  pages:
    name: "Pages — Deploy board preview site"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [erc, drc, export]
    if: github.event_name != 'pull_request' && needs.export.result == 'success'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/lib/*.sh

      - name: Download fab artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: fab-${{ github.sha }}
          path: site/fab/

      - name: Download docs artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: docs-${{ github.sha }}
          path: site/docs/

      - name: Download preview artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: preview-${{ github.sha }}
          path: site/preview/

      - name: Download assembly artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: assembly-${{ github.sha }}
          path: site/assembly/

      - name: Download 3D artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: 3d-${{ github.sha }}
          path: site/3d/

      - name: Download test points
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: testpoints-${{ github.sha }}
          path: site/testpoints/

      - name: Download KiCanvas source
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: source-${{ github.sha }}
          path: site/source/

      - name: Download ERC report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: erc-report
          path: site/reports/erc/

      - name: Download DRC report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: drc-report
          path: site/reports/drc/

      - name: Generate Pages site
        env:
          ERC_STATUS: ${{ needs.erc.result }}
          DRC_STATUS: ${{ needs.drc.result }}
          SITE_DIR: site
        run: scripts/gen-pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
